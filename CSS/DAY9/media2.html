<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            font-style: italic;
            font-size: 15px;
            font-weight: 800;
            padding: 20px;
        }
        @media screen {
            body::before{       
                content: '😂 this is visible on screen';
                display: block; 
                font-weight: bold;
            }
        }

        @media print{
            body{
                background-color: white;
                color: yellow ;
            }
            body::before{
                content: "this is visible only on the printout";
                font-weight: bold;
            }
        }

        /* @media (min-width: 300px){

            }
        }
           @media (max-width: 300px){
            body{
                background-color: red;
            }
        } */
    </style>
  </head>
  <body>
    <h1>Responsive Design</h1>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Deserunt eos odio
