<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        .container{
            display: grid;
            /* grid-template-columns: 1fr 1fr 1fr 1fr; */
            grid-template-columns: repeat(4,1fr);
            grid-template-rows: repeat(3,150px);
            gap: 20px;
            padding: 20px;
        }
        .grid-item{
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid;
            font-size: 20px;
            border-radius: 2px;
        }
        #item-1{
            background-color: greenyellow;
            grid-row: span 3;
        }
        #item-2{
            background-color: greenyellow;
            grid-column: span 2;
        }
        #item-3{
            background-color: red;
        }
         #item-5{
            background-color: red;
        }
         #item-7{
            background-color: red;
        }
         #item-6{
            background-color: greenyellow;
            grid-row: span 2;
        }
         #item-4{
            background-color: orange;
        }
         #item-8{
            background-color: orange;
        }

     </style>
</head>
<body>
    <div class="container">
        <div class="grid-item" id="item-1">BOX-1</div>
        <div class="grid-item" id="item-2">BOX-2</div>
        <div class="grid-item" id="item-3">BOX-3</div>
        <div class="grid-item" id="item-4">BOX-4</div>
        <div class="grid-item" id="item-5">BOX-5</div>
        <div class="grid-item" id="item-6">BOX-6</div>
        <div class="grid-item" id="item-7">BOX-7</div>
        <div class="grid-item" id="item-8">BOX-8</div>
        <!-- <div class="grid-item" id="item-9">BOX-9</div> -->
        <!-- <div class="grid-item" id="item-10">BOX-10</div> -->
        <!-- <div class="grid-item" id="item-11">BOX-11</div> -->
        <!-- <div class="grid-item" id="item-12">BOX-12</div> -->
    </div>
</body>
</html>
