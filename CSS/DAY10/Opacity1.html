<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
        }
        .container{
           width: 300px;
           height: 200px;
           background: url('../DAY1/image/virat.jfif') no-repeat center/cover;
           position: relative;
           margin: 50px auto;
           border-radius: 20px;
           /* outline: 20px;
           outline-width: 20px;
           outline-color: red; */
        }
        .text{
           position: absolute;
           top: 80%;
           left: 20%;
           background-color: black;
           width: 200px;
           border-radius: 10px;
           opacity:0.3;
        }
        .content{
            color: white;
            position: relative;
            top: 80%;
            left: 25%;
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text">.</div>
        <div class="content">Hello , opacity </div>
    </div>
</body>
</html>
